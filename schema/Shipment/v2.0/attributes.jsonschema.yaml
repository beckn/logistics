$schema: https://json-schema.org/draft/2020-12/schema
title: Shipment JSON Schema
type: object
properties:
  components:
    type: object
    properties:
      schemas:
        type: object
        properties:
          Shipment:
            $ref: '#/$defs/Shipment'
        additionalProperties: false
    required:
    - schemas
    additionalProperties: false
required:
- components
additionalProperties: false
$defs:
  Shipment:
    type: object
    title: Shipment
    description: 'A Shipment represents the movement of one or more packages from
      an origin to a destination. It is the top-level fulfillment entity in a logistics
      transaction and maps to beckn:Fulfillment.

      '
    required:
    - id
    - status
    - origin
    - destination
    properties:
      id:
        type: string
        description: Unique identifier for the shipment
        example: SHP-2024-001234
      trackingId:
        type: string
        description: Public tracking identifier shared with sender/receiver
        example: TRK9876543210IN
      status:
        type: string
        description: Current status of the shipment
        enum:
        - CREATED
        - PICKUP_PENDING
        - PICKED_UP
        - IN_TRANSIT
        - AT_HUB
        - OUT_FOR_DELIVERY
        - DELIVERED
        - FAILED_DELIVERY
        - RETURNED
        - CANCELLED
        example: IN_TRANSIT
      origin:
        $ref: https://schema.beckn.io/LogisticsPlace/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/LogisticsPlace
      destination:
        $ref: https://schema.beckn.io/LogisticsPlace/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/LogisticsPlace
      packages:
        type: array
        description: List of packages in this shipment
        items:
          $ref: https://schema.beckn.io/Package/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/Package
      carrier:
        $ref: https://schema.beckn.io/Carrier/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/Carrier
      driver:
        $ref: https://schema.beckn.io/LogisticsDriver/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/LogisticsDriver
      vehicle:
        $ref: https://schema.beckn.io/LogisticsVehicle/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/LogisticsVehicle
      route:
        $ref: https://schema.beckn.io/LogisticsRoute/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/LogisticsRoute
      scheduledPickup:
        type: string
        format: date-time
        description: Scheduled pickup time
      estimatedDelivery:
        type: string
        format: date-time
        description: Estimated delivery date and time
      actualDelivery:
        type: string
        format: date-time
        description: Actual delivery date and time
      deliverySlot:
        $ref: https://schema.beckn.io/DeliverySlot/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/DeliverySlot
      serviceType:
        type: string
        description: Type of logistics service
        enum:
        - HYPERLOCAL
        - COURIER
        - INTERSTATE
        - LONG_HAUL
        - EXPRESS
        example: EXPRESS
      specialInstructions:
        type: string
        description: Special handling instructions for the shipment
        example: Handle with care. Do not tilt.
      proof:
        $ref: https://schema.beckn.io/Proof/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/Proof
      fare:
        $ref: https://schema.beckn.io/LogisticsFare/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/LogisticsFare
      receipt:
        $ref: https://schema.beckn.io/LogisticsReceipt/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/LogisticsReceipt
      cancellationPolicy:
        $ref: https://schema.beckn.io/LogisticsCancellationPolicy/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/LogisticsCancellationPolicy
      returnPolicy:
        $ref: https://schema.beckn.io/ReturnPolicy/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/ReturnPolicy
      alerts:
        type: array
        description: Alerts raised for this shipment
        items:
          $ref: https://schema.beckn.io/LogisticsAlert/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/LogisticsAlert
      trackingUpdates:
        type: array
        description: History of tracking updates
        items:
          $ref: https://schema.beckn.io/TrackingUpdate/v2.0/attributes.jsonschema.yaml#/properties/components/properties/schemas/properties/TrackingUpdate
      createdAt:
        type: string
        format: date-time
        description: Timestamp when shipment was created
      updatedAt:
        type: string
        format: date-time
        description: Timestamp of last update
