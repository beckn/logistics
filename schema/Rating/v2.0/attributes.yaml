openapi: 3.1.1
info:
  title: Rating
  version: 2.0.0
  description: Schema definition for Rating in the Beckn Protocol
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Rating:
      x-iri: https://schema.beckn.io/Rating/v2.0
      description: Schema definition for Rating in the Beckn Protocol
      title: Rating
      type: object
      properties:
        '@type':
          type: string
          enum:
          - beckn:Rating
          description: Type of the rating
          example: beckn:Rating
        beckn:ratingValue:
          type: number
          minimum: 0
          maximum: 5
          description: Rating value (0-5)
          example: 4.8
        beckn:ratingCount:
          type: integer
          minimum: 0
          description: Number of ratings
          example: 1250
      required:
      - '@type'
