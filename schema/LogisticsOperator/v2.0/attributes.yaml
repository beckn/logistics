openapi: 3.1.1
info:
  title: Operator
  version: 2.0.0
  description: Schema for Operator in Beckn Logistics domain.
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    LogisticsOperator:
      x-iri: https://schema.beckn.io/LogisticsOperator/v2.0
      type: object
      title: Operator
      description: Entity operating a logistics network or fleet, responsible for end-to-end delivery service.
      required:
      - id
      - name
      properties:
        id:
          type: string
          example: OPR-DELHIVERY-001
        name:
          type: string
          example: Delhivery
        type:
          type: string
          enum:
          - 3PL
          - CAPTIVE
          - AGGREGATOR
          - POSTAL
          example: 3PL
        contact:
          $ref: https://schema.beckn.io/Contact/v2.0/attributes.yaml#/components/schemas/Contact
        website:
          type: string
          format: uri
        supportEmail:
          type: string
          format: email
        supportPhone:
          type: string
        rating:
          type: number
          minimum: 1
          maximum: 5
        activeCarriers:
          type: integer
          description: Number of carriers on the operator's network
        activeDrivers:
          type: integer
        deliveriesPerDay:
          type: integer
        serviceCoverage:
          type: object
          properties:
            countries:
              type: array
              items:
                type: string
            cities:
              type: array
              items:
                type: string
        certifications:
          type: array
          items:
            type: string
          example:
          - ISO9001
          - GDPR_COMPLIANT
