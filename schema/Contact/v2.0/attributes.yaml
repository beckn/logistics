openapi: 3.1.1
info:
  title: Contact
  version: 2.0.0
  description: Schema for Contact in Beckn Logistics domain.
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Contact:
      x-iri: https://schema.beckn.io/Contact/v2.0
      type: object
      title: Contact
      description: Contact information for sender, receiver, driver, or operator.
      properties:
        name:
          type: string
          example: Priya Mehta
        phone:
          type: string
          example: '+919876543210'
        email:
          type: string
          format: email
          example: priya.mehta@email.com
        alternatePhone:
          type: string
        company:
          type: string
          description: Company name if B2B contact
        gstNumber:
          type: string
          description: GST number for B2B invoicing
