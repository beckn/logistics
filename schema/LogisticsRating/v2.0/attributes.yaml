openapi: 3.1.1
info:
  title: Rating
  version: 2.0.0
  description: Schema for Rating in Beckn Logistics domain.
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    LogisticsRating:
      x-iri: https://schema.beckn.io/LogisticsRating/v2.0
      type: object
      title: Rating
      description: A numeric score given by a user for a logistics service, driver, or carrier.
      required:
      - value
      - ratingFor
      properties:
        id:
          type: string
          example: RTG-00456
        value:
          type: number
          minimum: 1
          maximum: 5
          example: 4.5
        ratingFor:
          type: string
          enum:
          - DRIVER
          - CARRIER
          - SERVICE
          - PACKAGING
          example: DRIVER
        ratedBy:
          type: string
          description: User ID who gave the rating
        shipmentId:
          type: string
        categories:
          type: object
          description: Category-wise ratings
          properties:
            timeliness:
              type: number
              minimum: 1
              maximum: 5
            packaging:
              type: number
              minimum: 1
              maximum: 5
            handling:
              type: number
              minimum: 1
              maximum: 5
            communication:
              type: number
              minimum: 1
              maximum: 5
        timestamp:
          type: string
          format: date-time
